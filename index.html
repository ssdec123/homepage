<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 반응형 홈페이지</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>
<body>

<header class="header">
  <div class="header-title">
    <h1>SSDEC <br> 서강 시스템반도체 설계교육센터</h1>
    <p class="header-subtitle">Sogang SoC Design and Education Center</p>
  </div>
  <!-- 햄버거 버튼 추가 -->
  <button class="hamburger">☰</button>
  
  <nav class="nav">
    <a href="#">센터안내</a>
     <!-- 교육과정 + 하위메뉴를 묶어서 그룹으로 만들기 -->
  <div class="menu-group">
    <button class="menu-parent">교육과정 ▼</button>

    <div class="submenu">
      <a href="class/global.html">글로벌 반도체 교육과정</a>
      <a href="class/soc.html">SoC 설계 교육과정</a>
    </div>
  </div>
    <a href="#">메뉴3</a>
    <a href="www.sogang.ac.kr">서강대학교</a>
  </nav>
</header>


  <!-- Hero 이미지 배너 -->
<section class="hero">
   <img src="images/main.png" alt="메인 배너 이미지">
  <div class="hero-text">
    <h2>환영합니다!</h2>
    <p>서강 시스템반도체 설계교육센터입니다.</p>
  </div>
</section>


  <!-- 카드형 그리드 (이미지 포함) -->
  <section class="content">
    <div class="card">
      <img src="images/pic1.jpg" alt="이미지1">
      <h3>카드 제목 1</h3>
      <p>카드 내용입니다. 이미지를 교체해보세요!</p>
    </div>

    <div class="card">
      <img src="images/pic2.jpg" alt="이미지2">
      <h3>카드 제목 2</h3>
      <p>반응형 구조로 이미지 크기가 자동 조절됩니다.</p>
    </div>

    <div class="card">
      <img src="images/pic3.jpg" alt="이미지3">
      <h3>카드 제목 3</h3>
      <p>여기에 원하는 이미지를 넣어보세요.</p>
    </div>
  </section>

  <footer class="footer">
    © 2026 My Website
  </footer>
<script>
  const ham = document.querySelector('.hamburger');
  const nav = document.querySelector('.nav');

  ham.addEventListener('click', () => {
    nav.classList.toggle('active');
  });

  // 세부 메뉴(아코디언) 기능
  const parentMenu = document.querySelector('.menu-parent');
  const submenu = document.querySelector('.submenu');

  if (parentMenu) {
    parentMenu.addEventListener('click', () => {
      submenu.classList.toggle('active');
      parentMenu.classList.toggle('active'); // ← 강조효과 주기
    });
  }
</script>
</body>
</html>
